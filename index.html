<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CargaNet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="auth-page">

<div class="auth-shell">
  <div class="card auth-card p-4">

    <div id="loginBox">
      <h4 class="mb-3">Iniciar sesión</h4>
      <input id="loginEmail" class="form-control mb-2" placeholder="Correo electrónico">
      <input id="loginPassword" type="password" class="form-control mb-3" placeholder="Contraseña">
      <button onclick="login()" class="btn btn-primary w-100">Ingresar</button>
      <p class="mt-3 mb-0 text-center"><a href="#" onclick="mostrarRegistro()">Crear cuenta</a></p>
    </div>

    <div id="registroBox" style="display:none;">
      <h4 class="mb-3">Crear cuenta</h4>
      <input id="nombre" class="form-control mb-2" placeholder="Nombre">
      <input id="registroEmail" class="form-control mb-2" placeholder="Correo electrónico">
      <input id="registroPassword" type="password" class="form-control mb-3" placeholder="Contraseña">
      <button onclick="registrar()" class="btn btn-success w-100">Registrarse</button>
      <p class="mt-3 mb-0 text-center"><a href="#" onclick="mostrarLogin()">Volver al login</a></p>
    </div>

  </div>
</div>

<script type="module" src="js/auth.js"></script>

<script>
function mostrarRegistro(){
document.getElementById("loginBox").style.display="none";
document.getElementById("registroBox").style.display="block";
}
function mostrarLogin(){
document.getElementById("loginBox").style.display="block";
document.getElementById("registroBox").style.display="none";
}
</script>

<script type="module" src="js/accessibility.js"></script>
</body>
</html>
