<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reportes - CargaNet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
<div class="layout">
  <aside class="sidebar">
    <h4 class="brand">CargaNet</h4>
    <a href="dashboard.html">Dashboard</a>
    <a href="clientes.html">Clientes</a>
    <a href="envios.html">Envíos</a>
    <a href="tracking.html">Seguimiento</a>
    <a class="active" href="reportes.html">Reportes</a>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h3>Reportes</h3>
        <div class="user-meta">Usuario: <strong id="usuarioNombre">...</strong></div>
      </div>
      <button onclick="logout()" class="btn btn-outline-danger">Salir</button>
    </div>

    <div class="surface p-3 mb-3">
      <h6 class="mb-3">Filtros</h6>
      <div class="row g-2 align-items-end">
        <div class="col-12 col-md-3">
          <label for="fechaDesde" class="form-label mb-1">Fecha desde</label>
          <input id="fechaDesde" type="date" class="form-control">
        </div>
        <div class="col-12 col-md-3">
          <label for="fechaHasta" class="form-label mb-1">Fecha hasta</label>
          <input id="fechaHasta" type="date" class="form-control">
        </div>
        <div class="col-12 col-md-3">
          <label for="filtroEstado" class="form-label mb-1">Estado</label>
          <select id="filtroEstado" class="form-select">
            <option value="">Todos</option>
            <option value="almacen">Almacén</option>
            <option value="transito">Tránsito</option>
            <option value="entregado">Entregado</option>
          </select>
        </div>
        <div class="col-12 col-md-3">
          <label for="filtroCliente" class="form-label mb-1">Cliente</label>
          <select id="filtroCliente" class="form-select">
            <option value="">Todos</option>
          </select>
        </div>
      </div>
    </div>

    <div class="surface p-3 mb-3">
      <div class="d-flex gap-2 flex-wrap">
        <button onclick="exportExcel()" class="btn btn-success">Exportar Excel</button>
        <button onclick="exportPDF()" class="btn btn-danger">Exportar PDF</button>
      </div>
    </div>

    <div class="surface p-3 mb-3">
      <h6 class="mb-3">Tabla de envíos</h6>
      <div class="table-responsive">
        <table class="table table-striped align-middle mb-0">
          <thead>
            <tr>
              <th>Código</th>
              <th>Cliente</th>
              <th>Descripción</th>
              <th>Estado</th>
              <th>Fecha</th>
            </tr>
          </thead>
          <tbody id="tabla"></tbody>
        </table>
      </div>
    </div>

    <div class="surface p-3">
      <h6 class="mb-3">Distribución por estado</h6>
      <div class="chart-box mx-auto" style="max-width: 420px; height: 320px;">
        <canvas id="grafico"></canvas>
      </div>
    </div>
  </main>
</div>

<script type="module" src="js/guard.js"></script>
<script type="module" src="js/reportes.js"></script>
</body>
</html>
