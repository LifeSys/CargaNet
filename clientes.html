<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clientes - CargaNet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
<div class="layout">
  <aside class="sidebar">
    <h4 class="brand">CargaNet</h4>
    <a href="dashboard.html">Dashboard</a>
    <a class="active" href="clientes.html">Clientes</a>
    <a href="envios.html">Envíos</a>
    <a href="tracking.html">Seguimiento</a>
    <a href="reportes.html">Reportes</a>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h3>Clientes</h3>
        <div class="user-meta">Usuario: <strong id="usuarioNombre">...</strong></div>
      </div>
      <button onclick="logout()" class="btn btn-outline-danger">Salir</button>
    </div>

    <div class="surface p-3 mb-3">
      <h6>Nuevo cliente</h6>
      <div class="row g-2">
        <div class="col-md-6">
          <input id="nombre" class="form-control" placeholder="Nombre completo">
        </div>
        <div class="col-md-3">
          <input id="dni" class="form-control" placeholder="DNI (8 dígitos)">
        </div>
        <div class="col-md-3">
          <input id="telefono" class="form-control" placeholder="Teléfono (9 dígitos)">
        </div>
        <div class="col-md-6">
          <input id="correo" type="email" class="form-control" placeholder="Correo electrónico">
        </div>
        <div class="col-md-4">
          <input id="direccion" class="form-control" placeholder="Dirección">
        </div>
        <div class="col-md-2 d-grid">
          <button onclick="guardarCliente()" class="btn btn-primary">Guardar</button>
        </div>
      </div>
    </div>

    <div class="surface p-3">
      <h6 class="mb-3">Listado de clientes</h6>
      <ul id="lista" class="list-group"></ul>
    </div>
  </main>
</div>

<script type="module" src="js/guard.js"></script>
<script type="module" src="js/clientes.js"></script>
<script type="module" src="js/accessibility.js"></script>
</body>
</html>
