<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard - CargaNet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
<div class="layout">
  <aside class="sidebar">
    <h4 class="brand">CargaNet</h4>
    <a class="active" href="dashboard.html">Dashboard</a>
    <a href="clientes.html">Clientes</a>
    <a href="envios.html">Envíos</a>
    <a href="tracking.html">Seguimiento</a>
    <a href="reportes.html">Reportes</a>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h3>Dashboard</h3>
        <div class="user-meta">Usuario: <strong id="usuarioNombre">...</strong></div>
      </div>
      <button onclick="logout()" class="btn btn-outline-danger">Salir</button>
    </div>

    <div class="row g-3">
      <div class="col-md-3 col-sm-6">
        <div class="metric-card p-3 bg-primary">
          <div class="card-title-muted">Clientes registrados</div>
          <h2 id="clientes">0</h2>
        </div>
      </div>
      <div class="col-md-3 col-sm-6">
        <div class="metric-card p-3" style="background:#f59e0b;">
          <div class="card-title-muted">En tránsito</div>
          <h2 id="transito">0</h2>
        </div>
      </div>
      <div class="col-md-3 col-sm-6">
        <div class="metric-card p-3" style="background:#16a34a;">
          <div class="card-title-muted">Entregados</div>
          <h2 id="entregado">0</h2>
        </div>
      </div>
      <div class="col-md-3 col-sm-6">
        <div class="metric-card p-3" style="background:#0f766e;">
          <div class="card-title-muted">Total ingresos</div>
          <h2 id="ingresos">$0.00</h2>
        </div>
      </div>
    </div>

    <div class="row g-3 mt-1">
      <div class="col-lg-6">
        <div class="surface p-3 h-100">
          <h6 class="mb-3">Envíos por estado</h6>
          <canvas id="graficoEstados" height="120"></canvas>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="surface p-3 h-100">
          <h6 class="mb-3">Envíos por día</h6>
          <canvas id="graficoEnviosDia" height="120"></canvas>
        </div>
      </div>
      <div class="col-12">
        <div class="surface p-3">
          <h6 class="mb-3">Ingresos por fecha</h6>
          <canvas id="graficoFechas" height="100"></canvas>
        </div>
      </div>
    </div>
  </main>
</div>

<script type="module" src="js/guard.js"></script>
<script type="module" src="js/dashboard.js"></script>
<script type="module" src="js/accessibility.js"></script>
</body>
</html>
