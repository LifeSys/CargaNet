<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Seguimiento - CargaNet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
<div class="layout">
  <aside class="sidebar">
    <h4 class="brand">CargaNet</h4>
    <a href="dashboard.html">Dashboard</a>
    <a href="clientes.html">Clientes</a>
    <a href="envios.html">Envíos</a>
    <a class="active" href="tracking.html">Seguimiento</a>
    <a href="reportes.html">Reportes</a>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h3>Seguimiento de envíos</h3>
        <div class="user-meta">Usuario: <strong id="usuarioNombre">...</strong></div>
      </div>
      <button onclick="logout()" class="btn btn-outline-danger">Salir</button>
    </div>

    <div class="surface p-3 mb-3">
      <h6>Buscar envío por código</h6>
      <div class="row g-2">
        <div class="col-md-6">
          <input id="codigoBusqueda" class="form-control" placeholder="Ejemplo: CN-0001" maxlength="20">
        </div>
        <div class="col-md-2 d-grid">
          <button onclick="buscarEnvio()" class="btn btn-primary">Buscar</button>
        </div>
      </div>
      <small class="text-muted">Ingresa el código exacto del envío.</small>
    </div>

    <div id="resultadoTracking" class="surface p-3 d-none">
      <h6 class="mb-3">Resultado</h6>
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <div><strong>Cliente:</strong></div>
          <div id="trackingCliente" class="text-muted">-</div>
        </div>
        <div class="col-md-4">
          <div><strong>Destinatario:</strong></div>
          <div id="trackingDestinatario" class="text-muted">-</div>
        </div>
        <div class="col-md-4">
          <div><strong>Estado actual:</strong></div>
          <span id="trackingEstado" class="badge text-bg-secondary">-</span>
        </div>
      </div>

      <h6 class="mb-2">Historial de estados</h6>
      <ul id="trackingTimeline" class="timeline-list mb-0"></ul>
    </div>

    <div id="trackingVacio" class="surface p-3 d-none">
      <p class="mb-0 text-muted">No se encontró un envío con ese código.</p>
    </div>
  </main>
</div>

<script type="module" src="js/guard.js"></script>
<script type="module" src="js/tracking.js"></script>
<script type="module" src="js/accessibility.js"></script>
</body>
</html>
